<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Image Gallery</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>Image Gallery</h1>
            <p class="subtitle">Beautiful collection of images - Filter, View, and Enjoy!</p>
        </div>
    </header>

    <main class="container">
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">
                <span>All Images</span>
            </button>
            <button class="filter-btn" data-filter="nature">
                <span>Nature</span>
            </button>
            <button class="filter-btn" data-filter="city">
                <span>City</span>
            </button>
            <button class="filter-btn" data-filter="people">
                <span>People</span>
            </button>
            <button class="filter-btn" data-filter="animals">
                <span>Animals</span>
            </button>
            <button class="filter-btn" data-filter="food">
                <span>Food</span>
            </button>
        </div>

        <div class="gallery" id="gallery">
        </div>
    </main>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <span class="lightbox-close" id="lightboxClose">&times;</span>
            <img src="" alt="" id="lightboxImage">
            <div class="lightbox-nav lightbox-prev" id="lightboxPrev">‹</div>
            <div class="lightbox-nav lightbox-next" id="lightboxNext">›</div>
            <div class="lightbox-info">
                <div class="lightbox-title" id="lightboxTitle"></div>
                <div class="lightbox-category" id="lightboxCategory"></div>
            </div>
        </div>
    </div>
    <button class="scroll-top" id="scrollTop">↑</button>


    <div class="loading" id="loading" style="display: none;">
        <div class="spinner"></div>
        <p>Loading images...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
